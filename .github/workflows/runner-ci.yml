name: Runner CI

on:
  push:
    branches: [master]
    paths:
      - '.github/runner/**'
      - '.github/workflows/runner-ci.yml'
  pull_request:
    branches: [master]
    paths:
      - '.github/runner/**'
      - '.github/workflows/runner-ci.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Runner Tests
    runs-on: self-hosted
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5

      - name: Run registration test harness
        run: bash .github/runner/scripts/test-registration.sh

      - name: Validate entrypoint syntax
        run: bash -n .github/runner/entrypoint.sh

      - name: Validate preflight script syntax
        run: bash -n .github/runner/scripts/preflight-check.sh

      - name: Shellcheck all scripts
        run: |
          if ! command -v shellcheck &>/dev/null; then
            curl -fsSL https://github.com/koalaman/shellcheck/releases/download/stable/shellcheck-stable.linux.x86_64.tar.xz \
              | tar -xJ --strip-components=1 -C /tmp shellcheck-stable/shellcheck
            export PATH="/tmp:$PATH"
          fi
          find .github/runner -name "*.sh" -print0 \
            | xargs -0 shellcheck --severity=warning
