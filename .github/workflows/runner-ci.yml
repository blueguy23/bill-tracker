name: Runner CI

on:
  push:
    branches: [master]
    paths:
      - '.github/runner'
      - '.github/runner/**'
      - '.github/workflows/runner-ci.yml'
  pull_request:
    branches: [master]
    paths:
      - '.github/runner'
      - '.github/runner/**'
      - '.github/workflows/runner-ci.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  runner-tests:
    name: Runner Tests
    runs-on: self-hosted
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: true

      - name: Run registration test harness
        run: bash .github/runner/scripts/test-registration.sh

      - name: Validate entrypoint syntax
        run: bash -n .github/runner/entrypoint.sh

      - name: Validate preflight script syntax
        run: bash -n .github/runner/scripts/preflight-check.sh

      - name: Shellcheck all scripts
        run: |
          find .github/runner -name "*.sh" -print0 \
            | xargs -0 shellcheck --severity=warning

  # Satisfies the "test" required status check in the branch ruleset.
  # Runner-only PRs don't trigger the main CI workflow, so without this
  # the gate check never reports and auto-merge blocks indefinitely.
  test:
    name: test
    needs: runner-tests
    runs-on: self-hosted
    timeout-minutes: 1
    steps:
      - run: echo "Runner tests passed — app CI not required"
