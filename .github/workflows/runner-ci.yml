name: Runner CI

on:
  push:
    branches: [master]
    paths:
      - '.github/runner/**'
  pull_request:
    branches: [master]
    paths:
      - '.github/runner/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Runner Tests
    runs-on: self-hosted
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5

      - name: Run registration test harness
        run: bash .github/runner/scripts/test-registration.sh

      - name: Validate entrypoint syntax
        run: bash -n .github/runner/entrypoint.sh

      - name: Validate preflight script syntax
        run: bash -n .github/runner/scripts/preflight-check.sh

      - name: Lint shell scripts (shellcheck)
        continue-on-error: true
        run: |
          set -euo pipefail
          for f in .github/runner/entrypoint.sh .github/runner/scripts/preflight-check.sh .github/runner/scripts/test-registration.sh; do
            echo "── shellcheck: $f ──"
            docker run --rm -i koalaman/shellcheck:stable -S warning --shell=bash - < "$f" || true
          done
