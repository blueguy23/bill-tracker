name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  # ── 1. TypeScript typecheck ───────────────────────────────────────────────────
  typecheck:
    name: TypeScript
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v2
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm typecheck

  # ── 2. Lint ───────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v2
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: ESLint
        run: pnpm lint

  # ── 3. Security audit ─────────────────────────────────────────────────────────
  audit:
    name: Security Audit
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v2
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Fails the job on high or critical CVEs.
      # Change to --audit-level=moderate to be stricter.
      - name: pnpm audit
        run: pnpm audit --audit-level=high

  # ── 3. Unit tests ─────────────────────────────────────────────────────────────
  unit:
    name: Unit Tests
    runs-on: self-hosted
    needs: typecheck
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v2
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Unit tests
        run: pnpm test:unit

  # ── 4. E2E tests ──────────────────────────────────────────────────────────────
  e2e:
    name: E2E Tests
    runs-on: self-hosted
    needs: unit
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v2
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Check Playwright cache
        id: playwright-cache
        run: find /home/garci/.cache/ms-playwright -name 'chrome-headless-shell' 2>/dev/null | grep -q . && echo "cache-hit=true" >> $GITHUB_OUTPUT || echo "cache-hit=false" >> $GITHUB_OUTPUT

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install chromium

      - name: Clear previous test results
        run: rm -rf test-results playwright-report

      - name: E2E tests
        run: pnpm test:e2e
        env:
          STRICTDB_URI: mongodb://localhost:27017/bill-tracker
          NODE_ENV: test

      - name: Print E2E failures
        if: failure()
        run: |
          if [ -f test-results/results.json ]; then
            node -e "
              const r = require('./test-results/results.json');
              const specs = [];
              function collect(suites) {
                for (const s of suites || []) {
                  for (const spec of s.specs || []) specs.push(spec);
                  collect(s.suites);
                }
              }
              collect(r.suites);
              const failed = specs.filter(s => s.tests.some(t => t.status === 'unexpected' || t.results?.some(r => r.status === 'failed' || r.status === 'timedOut')));
              if (failed.length === 0) { console.log('No failures found in report'); process.exit(0); }
              console.log('\n=== FAILED TESTS (' + failed.length + ') ===\n');
              failed.forEach(s => {
                console.log('FAILED:', s.title);
                s.tests.forEach(t => t.results?.forEach(r => { if (r.error) console.log('  ', r.error.message?.split('\n')[0]); }));
              });
            "
          else
            echo "No results.json found — server likely failed to start"
          fi

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            playwright-report/
            test-results/

  # ── 5. Gate — satisfies the "test" required status check in branch ruleset ──────
  test:
    name: test
    runs-on: self-hosted
    needs: [typecheck, lint, audit, unit, e2e]
    steps:
      - run: echo "All checks passed"

  # ── 6. Docker build (verify image builds on pushes to master) ─────────────────
  docker:
    name: Docker Build
    runs-on: self-hosted
    needs: [typecheck, unit]
    # Build verification only on pushes to master (not on every PR)
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (verify only — no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: bill-tracker:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # NEXT_PUBLIC_* build args — blank in CI so analytics is simply disabled
          build-args: |
            NEXT_PUBLIC_RYBBIT_SITE_ID=
            NEXT_PUBLIC_RYBBIT_URL=
