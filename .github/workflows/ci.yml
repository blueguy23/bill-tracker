name: CI
# Required GitHub Actions Secrets:
#   AUTH_SECRET        — used by: Integration Tests
#   AUTH_PASSWORD      — used by: Integration Tests
#   GITHUB_PAT        — used by: self-hosted runner (container .env, not referenced in this file)
#   DOCKERHUB_USERNAME — used by: self-hosted runner (container .env, not referenced in this file)
#   DOCKERHUB_TOKEN   — used by: self-hosted runner (container .env, not referenced in this file)
#
# ACTION REQUIRED: rotate AUTH_SECRET and AUTH_PASSWORD in GitHub repo settings
# after this commit — old values are in repo history.

# Job execution order:
#   [runner-health] (2-min gate — fail fast if runner is broken)
#          ↓
#   dora-start ──────────────────────────────────────────┐
#   [SAST, Security Audit, Lint, TypeScript]  (parallel) │
#          ↓ (all four must pass)                        │
#       [Unit Tests]                                     │
#          ↓                                             │
#       [Integration Tests]                              │
#          ↓                                             │
#       [E2E Tests] ─────────────────────────────────────┤
#          ↓                                             │
#       [dora-emit] ◄────────────────────────────────────┘
#          ↓
#       [dora-summary]

on:
  push:
    branches: [master]
    paths-ignore:
      - '.github/runner/**'
      - 'docs/**'
  pull_request:
    branches: [master]
    paths-ignore:
      - '.github/runner/**'
      - 'docs/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── 0. Runner health gate — fail fast if the runner environment is broken ────
  runner-health:
    name: Runner Health
    runs-on: self-hosted
    timeout-minutes: 2
    steps:
      - name: Verify runner environment
        run: |
          set -euo pipefail
          echo "── Runner Health Check ──"
          echo "Date:    $(date -u)"
          echo "Node:    $(node --version 2>/dev/null || echo 'MISSING')"
          echo "pnpm:    $(pnpm --version 2>/dev/null || echo 'MISSING')"
          echo "Docker:  $(docker --version 2>/dev/null || echo 'MISSING')"
          echo "Mongo:   $(mongosh --version 2>/dev/null || echo 'MISSING')"
          echo "Disk:    $(df -h / | tail -1 | awk '{print $4 " free"}')"

          node --version >/dev/null 2>&1 || { echo "FATAL: node not found"; exit 1; }
          pnpm --version >/dev/null 2>&1 || { echo "FATAL: pnpm not found"; exit 1; }
          docker info >/dev/null 2>&1 || { echo "FATAL: docker not accessible"; exit 1; }
          mongosh --eval "db.adminCommand('ping')" --quiet || { echo "FATAL: MongoDB not responding"; exit 1; }

  # ── DORA: capture pipeline start + commit timestamp ───────────────────────────
  # Runs in parallel with the first validation tier — no critical-path cost.
  # commit-epoch comes from the event payload so no checkout is needed.
  dora-start:
    needs: [runner-health]
    name: DORA Start
    runs-on: self-hosted
    timeout-minutes: 2
    outputs:
      start-epoch: ${{ steps.ts.outputs.start-epoch }}
      commit-epoch: ${{ steps.ts.outputs.commit-epoch }}
    steps:
      - id: ts
        run: |
          set -euo pipefail
          echo "start-epoch=$(date -u +%s)" >> "$GITHUB_OUTPUT"

          # Push events carry the commit timestamp in the event payload.
          # PRs don't produce deployments so we fall back to now — those
          # runs are excluded from the master-only aggregations in dora-summary.
          COMMIT_TS="${{ github.event.head_commit.timestamp }}"
          if [ -n "$COMMIT_TS" ]; then
            EPOCH=$(date -d "$COMMIT_TS" +%s 2>/dev/null || date -u +%s)
          else
            EPOCH=$(date -u +%s)
          fi
          echo "commit-epoch=$EPOCH" >> "$GITHUB_OUTPUT"

  # ── 1a. SAST (Semgrep) ─────────────────────────────────────────────────────────
  semgrep:
    name: SAST (Semgrep)
    needs: [runner-health]
    runs-on: self-hosted
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - name: Run Semgrep
        run: |
          set -euo pipefail
          docker run --rm -v "${{ github.workspace }}:/src" \
            semgrep/semgrep \
            semgrep scan --config p/javascript --config p/typescript --error /src

  # ── 1b. TypeScript typecheck ──────────────────────────────────────────────────
  typecheck:
    name: TypeScript
    needs: [runner-health]
    runs-on: self-hosted
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        timeout-minutes: 5
        with:
          node-version-file: '.node-version'

      - uses: pnpm/action-setup@v4

      - run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm typecheck

  # ── 2. Lint ───────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    needs: [runner-health]
    runs-on: self-hosted
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        timeout-minutes: 5
        with:
          node-version-file: '.node-version'

      - uses: pnpm/action-setup@v4

      - run: pnpm install --frozen-lockfile

      - name: ESLint
        run: pnpm lint

  # ── 3. Security audit ─────────────────────────────────────────────────────────
  audit:
    name: Security Audit
    needs: [runner-health]
    runs-on: self-hosted
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        timeout-minutes: 5
        with:
          node-version-file: '.node-version'

      - uses: pnpm/action-setup@v4

      - name: pnpm audit
        run: pnpm audit --audit-level=high

  # ── 4. Unit tests ─────────────────────────────────────────────────────────────
  unit:
    name: Unit Tests
    runs-on: self-hosted
    timeout-minutes: 10
    needs: [semgrep, audit, lint, typecheck]
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        timeout-minutes: 5
        with:
          node-version-file: '.node-version'

      - uses: pnpm/action-setup@v4

      - run: pnpm install --frozen-lockfile

      - name: Unit tests
        run: pnpm test:unit

  # ── 5. Integration tests ───────────────────────────────────────────────────────
  integration:
    name: Integration Tests
    runs-on: self-hosted
    timeout-minutes: 15
    needs: unit
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        timeout-minutes: 5
        with:
          node-version-file: '.node-version'

      - uses: pnpm/action-setup@v4

      - run: pnpm install --frozen-lockfile

      - name: Integration tests
        run: pnpm test:integration
        env:
          STRICTDB_URI: mongodb://localhost:27017/bill-tracker-integration
          DATABASE_NAME: bill-tracker-integration
          NODE_ENV: test
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          AUTH_PASSWORD: ${{ secrets.AUTH_PASSWORD }}

  # ── 6. E2E tests ──────────────────────────────────────────────────────────────
  e2e:
    name: E2E Tests
    runs-on: self-hosted
    timeout-minutes: 30
    needs: integration
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        timeout-minutes: 5
        with:
          node-version-file: '.node-version'

      - uses: pnpm/action-setup@v4

      - run: pnpm install --frozen-lockfile

      - name: Check Playwright cache
        id: playwright-cache
        run: find /home/garci/.cache/ms-playwright -name 'chrome-headless-shell' 2>/dev/null | grep -q . && echo "cache-hit=true" >> $GITHUB_OUTPUT || echo "cache-hit=false" >> $GITHUB_OUTPUT

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install chromium

      - name: Clear previous test results
        run: rm -rf test-results playwright-report

      - name: E2E tests
        run: pnpm test:e2e
        env:
          STRICTDB_URI: mongodb://localhost:27017/bill-tracker
          NODE_ENV: test

      - name: Print E2E failures
        if: failure()
        run: |
          set -euo pipefail
          if [ -f test-results/results.json ]; then
            node -e "
              const r = require('./test-results/results.json');
              const specs = [];
              function collect(suites) {
                for (const s of suites || []) {
                  for (const spec of s.specs || []) specs.push(spec);
                  collect(s.suites);
                }
              }
              collect(r.suites);
              const failed = specs.filter(s => s.tests.some(t => t.status === 'unexpected' || t.results?.some(r => r.status === 'failed' || r.status === 'timedOut')));
              if (failed.length === 0) { console.log('No failures found in report'); process.exit(0); }
              console.log('\n=== FAILED TESTS (' + failed.length + ') ===\n');
              failed.forEach(s => {
                console.log('FAILED:', s.title);
                s.tests.forEach(t => t.results?.forEach(r => { if (r.error) console.log('  ', r.error.message?.split('\n')[0]); }));
              });
            "
          else
            echo "No results.json found — server likely failed to start"
          fi

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: test-results
          path: |
            playwright-report/
            test-results/

  # ── 7. Gate — satisfies the "test" required status check in branch ruleset ──────
  test:
    name: test
    runs-on: self-hosted
    timeout-minutes: 5
    needs: [semgrep, typecheck, lint, audit, unit, integration, e2e]
    steps:
      - run: echo "All checks passed"

  # ── 8. Docker build (verify image builds on pushes to master) ─────────────────
  docker:
    name: Docker Build
    runs-on: self-hosted
    timeout-minutes: 10
    needs: [typecheck, unit]
    # Build verification only on pushes to master (not on every PR)
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v5

      # docker/setup-buildx-action creates a separate buildkitd container which
      # cannot inherit the runner's Docker socket group permissions — permission
      # denied on self-hosted runners. Plain docker build uses the daemon's own
      # layer cache which persists across runs without needing GHA cache.
      - name: Build image (verify only — no push)
        run: |
          set -euo pipefail
          docker build \
            --tag bill-tracker:ci \
            --build-arg NEXT_PUBLIC_RYBBIT_SITE_ID= \
            --build-arg NEXT_PUBLIC_RYBBIT_URL= \
            .

  # ── DORA: write metrics to MongoDB after the pipeline completes ───────────────
  # Runs regardless of outcome — failure rate is itself a DORA metric.
  # e2e is the last required job; skipped means an upstream job failed first.
  # Only master pushes count as "deployments" for Deployment Frequency and
  # Lead Time — PR runs are stored but excluded from those aggregations.
  dora-emit:
    name: DORA Emit
    runs-on: self-hosted
    timeout-minutes: 5
    needs: [dora-start, e2e]
    if: ${{ !cancelled() }}
    steps:
      - name: Write metrics to MongoDB
        run: |
          set -euo pipefail

          START="${{ needs.dora-start.outputs.start-epoch }}"
          COMMIT="${{ needs.dora-start.outputs.commit-epoch }}"
          NOW=$(date -u +%s)

          E2E_RESULT="${{ needs.e2e.result }}"
          # skipped means an upstream job failed before e2e could run
          [ "$E2E_RESULT" = "skipped" ] && OUTCOME="failure" || OUTCOME="$E2E_RESULT"

          PIPELINE_DURATION=$(( NOW - START ))
          LEAD_TIME=$(( NOW - COMMIT ))

          mongosh mongodb://localhost:27017/bill-tracker --quiet --eval "
            db.dora_runs.insertOne({
              sha:               '${{ github.sha }}',
              branch:            '${{ github.ref_name }}',
              outcome:           '${OUTCOME}',
              pipelineDurationS: ${PIPELINE_DURATION},
              leadTimeS:         ${LEAD_TIME},
              runId:             '${{ github.run_id }}',
              runNumber:         ${{ github.run_number }},
              timestamp:         new Date(${NOW} * 1000)
            });
          "

  # ── DORA: write Job Summary ───────────────────────────────────────────────────
  # Visible by clicking any workflow run in the GitHub Actions tab.
  # Aggregates the last 30 days from MongoDB — no external tooling needed.
  # CFR uses CI pipeline failures as a proxy; true CFR requires marking
  # production incidents separately (not yet implemented).
  dora-summary:
    name: DORA Summary
    runs-on: self-hosted
    timeout-minutes: 5
    needs: [dora-start, dora-emit]
    if: ${{ !cancelled() }}
    steps:
      - name: Generate DORA Job Summary
        run: |
          set -euo pipefail
          DAYS=30

          RECORDS=$(mongosh mongodb://localhost:27017/bill-tracker --quiet --eval "
            JSON.stringify(
              db.dora_runs
                .find({ timestamp: { \$gte: new Date(Date.now() - ${DAYS} * 86400000) } })
                .toArray()
            );
          ")

          TOTAL=$(echo "$RECORDS" | jq 'length')

          # Deployments = successful pushes to master only
          DEPLOYS=$(echo "$RECORDS" | jq '[.[] | select(.outcome == "success" and .branch == "master")] | length')
          FAILURES=$(echo "$RECORDS" | jq '[.[] | select(.outcome == "failure")] | length')

          DEPLOYS_PER_DAY=$(awk "BEGIN { printf \"%.2f\", ${DEPLOYS} / ${DAYS} }")

          # Lead time over master successes only (PRs aren't deployments)
          AVG_LEAD_S=$(echo "$RECORDS" | jq '[.[] | select(.outcome == "success" and .branch == "master") | .leadTimeS] | if length > 0 then (add / length | floor) else 0 end')
          AVG_LEAD_MIN=$(awk "BEGIN { printf \"%.1f\", ${AVG_LEAD_S} / 60 }")

          AVG_DUR_S=$(echo "$RECORDS" | jq '[.[].pipelineDurationS] | if length > 0 then (add / length | floor) else 0 end')
          AVG_DUR_MIN=$(awk "BEGIN { printf \"%.1f\", ${AVG_DUR_S} / 60 }")

          if [ "$TOTAL" -gt 0 ]; then
            CFR=$(awk "BEGIN { printf \"%.1f\", ${FAILURES} * 100 / ${TOTAL} }")
          else
            CFR="0.0"
          fi

          # Ratings vs DORA elite benchmarks — all arithmetic via awk, no bc needed
          FREQ_RATING=$(awk "BEGIN { print (${DEPLOYS_PER_DAY} >= 1)   ? \"🟢 Elite\" : (${DEPLOYS_PER_DAY} >= 0.14) ? \"🟡 High\" : \"🔴 Low\" }")
          LEAD_RATING=$(awk "BEGIN { print (${AVG_LEAD_MIN}    < 60)   ? \"🟢 Elite\" : (${AVG_LEAD_MIN}    < 1440)  ? \"🟡 High\" : \"🔴 Low\" }")
          CFR_RATING=$( awk "BEGIN { print (${CFR}             < 5)    ? \"🟢 Elite\" : (${CFR}             < 15)    ? \"🟡 Medium\" : \"🔴 High\" }")

          # Pull this run's record from MongoDB (written by dora-emit above)
          THIS_RUN=$(echo "$RECORDS" | jq --arg rid "${{ github.run_id }}" '.[] | select(.runId == $rid)')
          THIS_OUTCOME=$(echo "$THIS_RUN" | jq -r '.outcome // "unknown"')
          case "$THIS_OUTCOME" in
            success)   THIS_BADGE="✅ passed" ;;
            failure)   THIS_BADGE="❌ failed" ;;
            cancelled) THIS_BADGE="⚠️ cancelled" ;;
            *)         THIS_BADGE="⚠️ ${THIS_OUTCOME}" ;;
          esac

          cat >> "$GITHUB_STEP_SUMMARY" << SUMMARY
          ## DORA Metrics — Last ${DAYS} Days

          | Metric | Value | vs Elite Benchmark |
          |--------|-------|--------------------|
          | 🚀 Deployment Frequency | ${DEPLOYS_PER_DAY}/day (${DEPLOYS} deploys) | ${FREQ_RATING} |
          | ⏱ Lead Time for Changes | ${AVG_LEAD_MIN} min avg | ${LEAD_RATING} |
          | 💥 Change Failure Rate | ${CFR}% (${FAILURES} of ${TOTAL} runs failed) | ${CFR_RATING} |
          | 🔧 Avg Pipeline Duration | ${AVG_DUR_MIN} min | — |

          > **CFR** uses CI failures as a proxy — true change failure rate requires marking production incidents separately.
          > **MTTR** not yet tracked — requires a separate incident-marking workflow.

          ---

          ### This Run
          | | |
          |---|---|
          | Result | ${THIS_BADGE} |
          | SHA | \`${{ github.sha }}\` |
          | Branch | \`${{ github.ref_name }}\` |
          | Run | [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |

          ---
          *${TOTAL} pipeline runs in last ${DAYS} days · Updates automatically on every run*
          SUMMARY

      - name: Notify on failure
        if: ${{ needs.dora-emit.result == 'failure' || needs.dora-emit.result == 'skipped' }}
        run: |
          set -euo pipefail
          echo "::error::Pipeline failed for ${{ github.ref_name }} @ ${{ github.sha }}"
