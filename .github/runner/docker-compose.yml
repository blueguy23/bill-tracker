services:

  # ── GitHub Actions Runner ────────────────────────────────────────────────────
  runner:
    build:
      context: .
    image: bill-tracker-runner:latest
    restart: unless-stopped
    # init: true is intentionally absent — the Dockerfile ENTRYPOINT already invokes
    # tini explicitly. Adding init: true here would inject a second tini as PID 1,
    # demoting our tini to a child process and triggering subreaper warnings.

    environment:
      GITHUB_PAT: ${GITHUB_PAT}
      RUNNER_NAME: ${RUNNER_NAME:-ci-docker}
      REPO_OWNER: ${REPO_OWNER:-blueguy23}
      REPO_NAME: ${REPO_NAME:-bill-tracker}
      DOCKERHUB_USERNAME: ${DOCKERHUB_USERNAME:-}
      DOCKERHUB_TOKEN: ${DOCKERHUB_TOKEN:-}
      SESSION_CONFLICT_WAIT: ${SESSION_CONFLICT_WAIT:-30}
      # WATCHDOG_MAX_FIRES: max watchdog restarts per hour before
      # circuit opens and backs off (default: 5)
      WATCHDOG_MAX_FIRES: ${WATCHDOG_MAX_FIRES:-5}

    # GID of the host Docker socket — lets runner user call docker CLI without root.
    # Correct for WSL2: matches GID 1001 of /var/run/docker.sock on this machine.
    # (usermod -aG docker approach uses the container's docker GID which differs)
    # RISK ACCEPTED: SYS_TIME broadens container escape surface.
    # Required for chrony clock sync — no mitigation available that
    # preserves clock correction. Accept as-is for local runner.
    # ESCALATE BEFORE: replicating this runner pattern to shared or
    # cloud environments.
    cap_add:
      - SYS_TIME

    # TCP keepalive — WSL2 default is 7200s; dead connections go undetected for 2h.
    # Must be set here (Docker daemon writes at container creation time) — sysctl -w
    # inside the container silently succeeds but WSL2 discards the write.
    # 60/10/6 = detect dead connection within ~60s + 6 probes × 10s = ~2 min max.
    sysctls:
      net.ipv4.tcp_keepalive_time: 60
      net.ipv4.tcp_keepalive_intvl: 10
      net.ipv4.tcp_keepalive_probes: 6

    group_add:
      - "${DOCKER_GID:-1001}"

    volumes:
      # RISK ACCEPTED: Docker socket grants effective root on the host.
      # Acceptable for single-user local runner executing only trusted code.
      # ESCALATE BEFORE: running untrusted PRs (forks, Dependabot with
      # custom scripts, external contributors) — replace with
      # tecnativa/docker-socket-proxy whitelisting only required API calls.
      # THREAT: compromised supply chain (malicious postinstall/test script)
      # can reach this socket and escape the container.
      - /var/run/docker.sock:/var/run/docker.sock
      - runner-config:/home/garci/actions-runner
      - runner-work:/home/garci/actions-runner/_work
      - playwright-cache:/home/garci/.cache/ms-playwright
      - pnpm-store:/home/garci/.local/share/pnpm/store
      - mongo-data:/data/db

    # Resource caps — prevent runaway jobs from starving the host
    mem_limit: 6g
    memswap_limit: 6g
    cpus: ${RUNNER_CPUS:-3.0}

    healthcheck:
      test: ["CMD", "/deep-healthcheck.sh"]
      interval: 30s
      timeout: 15s
      start_period: 120s
      retries: 3

    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # ── Autoheal — restarts unhealthy containers automatically ───────────────────
  # Catches zombie runner processes that pass pgrep but are stuck accepting no jobs
  autoheal:
    image: willfarrell/autoheal@sha256:5c714bcf53e70c24329060b85477623cc2a0b05a065095c04785e0afb179c8be
    container_name: autoheal
    restart: always
    init: true

    environment:
      AUTOHEAL_CONTAINER_LABEL: all
      AUTOHEAL_INTERVAL: 30
      AUTOHEAL_START_PERIOD: 120
      CURL_TIMEOUT: 30

    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  # ── Disk watcher — prunes Docker artifacts before disk fills ─────────────────
  disk-watcher:
    image: docker:27-cli
    container_name: disk-watcher
    restart: always
    init: true

    environment:
      PRUNE_THRESHOLD_GB: ${PRUNE_THRESHOLD_GB:-10}

    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./disk-watch.sh:/disk-watch.sh:ro

    entrypoint: ["sh", "/disk-watch.sh"]

volumes:
  runner-config:
  runner-work:
  playwright-cache:
  pnpm-store:
  mongo-data:
