services:
  runner:
    build:
      context: .
      args:
        RUNNER_VERSION: "2.333.1"
    image: bill-tracker-runner:latest
    restart: unless-stopped
    environment:
      GITHUB_PAT: ${GITHUB_PAT}
      RUNNER_NAME: ${RUNNER_NAME:-ci-docker}
    # Add the host Docker socket's group GID so the runner user can call docker CLI.
    # Default 1001 matches this machine; override via DOCKER_GID in .env if yours differs.
    group_add:
      - "${DOCKER_GID:-1001}"
    volumes:
      # Docker socket — lets CI jobs run `docker build` without a nested daemon
      - /var/run/docker.sock:/var/run/docker.sock
      # Persist job workspaces across container restarts
      - runner-work:/home/garci/actions-runner/_work
      # Cache Playwright Chromium binary (ci.yml checks this exact path)
      - playwright-cache:/home/garci/.cache/ms-playwright
      # Cache pnpm store so `pnpm install` hits disk instead of re-downloading
      - pnpm-store:/home/garci/.local/share/pnpm/store
      # MongoDB data — survives container restarts
      - mongo-data:/data/db
      # No host home-dir mount — intentionally isolated from .env files

volumes:
  runner-work:
  playwright-cache:
  pnpm-store:
  mongo-data:
