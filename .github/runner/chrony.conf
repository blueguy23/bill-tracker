# chrony.conf — tighter NTP sync for WSL2 environments
# WSL2 clocks drift significantly after host sleep/wake cycles

# Use multiple NTP pools for redundancy
pool pool.ntp.org iburst maxsources 4
pool time.cloudflare.com iburst maxsources 2

# Allow stepping the clock (not just slewing) when drift > 1 second.
# -1 = allow step at any time (not just first N updates).
# Critical for WSL2 — drift can jump mid-job after host sleep/wake.
makestep 1.0 -1

# Sync to hardware clock on start
rtcsync

# Tighten polling — WSL VMs need more frequent correction
minpoll 4
maxpoll 8

# Log tracking data for debugging drift issues
logdir /var/log/chrony
log tracking measurements statistics
