# bill-tracker — self-hosted Docker Compose
#
# MongoDB is NOT bundled here. Bring your own:
#   - MongoDB Atlas free tier (recommended for self-hosters): https://www.mongodb.com/atlas
#   - Self-hosted Mongo: add a `mongo` service below and set MONGODB_URI=mongodb://mongo:27017/bill-tracker
#
# Required .env vars (copy from .env.example):
#   MONGODB_URI, AUTH_SECRET, AUTH_PASSWORD
#   Optional: NEXT_PUBLIC_RYBBIT_SITE_ID, NEXT_PUBLIC_RYBBIT_URL, TROVE_API_KEY, SIMPLEFIN_TOKEN

version: '3.9'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      # Pass NEXT_PUBLIC_* vars at build time if using analytics
      args:
        NEXT_PUBLIC_RYBBIT_SITE_ID: ${NEXT_PUBLIC_RYBBIT_SITE_ID:-}
        NEXT_PUBLIC_RYBBIT_URL: ${NEXT_PUBLIC_RYBBIT_URL:-}
    image: bill-tracker:latest
    container_name: bill-tracker
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    healthcheck:
      # node:22-slim doesn't include curl; use Node's built-in fetch (stable since Node 18)
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3000/api/v1/health').then(r=>r.ok?process.exit(0):process.exit(1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── Optional: Traefik reverse proxy with auto-SSL ─────────────────────────
  # Uncomment and replace yourdomain.com + your email to enable.
  # traefik:
  #   image: traefik:v3
  #   ports: ["80:80", "443:443"]
  #   command:
  #     - --providers.docker=true
  #     - --providers.docker.exposedbydefault=false
  #     - --entrypoints.web.address=:80
  #     - --entrypoints.websecure.address=:443
  #     - --certificatesresolvers.letsencrypt.acme.email=you@yourdomain.com
  #     - --certificatesresolvers.letsencrypt.acme.storage=/acme.json
  #     - --certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web
  #   volumes:
  #     - /var/run/docker.sock:/var/run/docker.sock
  #     - ./acme.json:/acme.json
  #   labels:
  #     - "traefik.enable=false"

  # ── If app labels are uncommented above, also uncomment these on the app ──
  # labels:
